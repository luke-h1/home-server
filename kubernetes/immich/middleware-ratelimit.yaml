# Auth/OAuth rate limit; source = CF-Connecting-IP (set by Cloudflare).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: immich-auth-ratelimit
  namespace: immich
spec:
  rateLimit:
    average: 15
    period: 1m
    burst: 10
    sourceCriterion:
      requestHeaderName: CF-Connecting-IP
