apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  labels:
    app: immich-server
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      securityContext:
        fsGroup: 0
      initContainers:
        - name: postgresql-isready
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: immich-env
                  key: DB_USERNAME
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: immich-env
                  key: DB_DATABASE_NAME
          command:
            - /bin/sh
            - -c
            - until pg_isready -U immich -d dbname=immich -h immich-database -p 5432; do sleep 2; done
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2283
            - name: metrics
              containerPort: 8081
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: DB_PASSWORD
            - name: CPU_CORES
              value: "1"
            - name: IMMICH_CONFIG_FILE
              value: /config/configuration.yml
          envFrom:
            - configMapRef:
                name: immich-env
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: library
              mountPath: /usr/src/app/upload
              subPath: library
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1100m"
              memory: 3Gi
        - name: library-s3-backup
          image: amazon/aws-cli:2.17.44
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_DEFAULT_REGION
              value: "${AWS_REGION}"
            - name: BUCKET
              value: "${BACKUP_S3_BUCKET}"
            - name: PREFIX
              value: "${BACKUP_S3_PREFIX}"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              idle_sleep=86400
              next_sync_epoch() {
                now_hour=$(date -u +%H)
                now_minute=$(date -u +%M)
                now_second=$(date -u +%S)
                now_total=$((10#$now_hour * 3600 + 10#$now_minute * 60 + 10#$now_second))
                if [ "$now_total" -lt 28800 ]; then
                  printf '%s\n' "$(date -u -d 'today 08:00:00' +%s)"
                  return
                fi
                if [ "$now_total" -lt 43200 ]; then
                  printf '%s\n' "$(date -u -d 'today 12:00:00' +%s)"
                  return
                fi
                if [ "$now_total" -lt 54000 ]; then
                  printf '%s\n' "$(date -u -d 'today 15:00:00' +%s)"
                  return
                fi
                printf '%s\n' "$(date -u -d 'tomorrow 08:00:00' +%s)"
              }
              while true; do
                if [ -z "${BUCKET}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) library-s3-backup idle (no bucket or credentials)"
                  sleep "$idle_sleep"
                  continue
                fi
                now=$(date -u +%s)
                target=$(next_sync_epoch)
                wait_sec=$((target - now))
                if [ "$wait_sec" -gt 0 ]; then
                  echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) library-s3-backup sleeping ${wait_sec}s until 08:00, 12:00, or 15:00 UTC"
                  sleep "$wait_sec"
                fi
                dest="s3://${BUCKET}/${PREFIX%/}/library/"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) syncing /media -> ${dest}"
                aws s3 sync /media "${dest}" --no-progress || echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) sync failed (will retry at the next scheduled run)"
              done
          volumeMounts:
            - name: library
              mountPath: /media
              readOnly: true
              subPath: library
          resources:
            requests:
              cpu: 50m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: immich-config
        - name: library
          persistentVolumeClaim:
            claimName: immich-library-pvc
