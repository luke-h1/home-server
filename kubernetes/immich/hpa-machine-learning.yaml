# HPA for ML only: immich-server uses a ReadWriteOnce library PVC and must stay at 1 replica.
# maxReplicas: 1 — sane default for ~2 vCPU nodes (raise if you add cores).
# Requires metrics-server (bundled with typical k3s installs).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-machine-learning
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
