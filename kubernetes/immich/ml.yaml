apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
  labels:
    app: immich-machine-learning
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: DB_PASSWORD
            - name: TRANSFORMERS_CACHE
              value: /cache
            # Low-CPU nodes (~2 vCPU): defaults follow host core count and intra-op=2, which starves API/DB.
            # See https://immich.app/docs/install/environment-variables/ (Machine Learning).
            - name: MACHINE_LEARNING_REQUEST_THREADS
              value: "1"
            - name: MACHINE_LEARNING_MODEL_INTRA_OP_THREADS
              value: "1"
            - name: MACHINE_LEARNING_MAX_BATCH_SIZE__OCR
              value: "2"
            - name: MACHINE_LEARNING_MAX_BATCH_SIZE__FACIAL_RECOGNITION
              value: "1"
          envFrom:
            - configMapRef:
                name: immich-env
          livenessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /cache
          resources:
            requests:
              cpu: 150m
              memory: 768Mi
            limits:
              cpu: "600m"
              memory: 3Gi
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 5Gi
