apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider-cloudflare
  namespace: monitoring
data:
  cloudflare.yaml: |
    apiVersion: 1
    providers:
      - name: Cloudflare
        folder: Cloudflare
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        options:
          path: /var/lib/grafana/dashboards/cloudflare
