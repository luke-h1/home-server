# Secrets: scripts/k8s.sh secrets (kubernetes/.env)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: grafana-dashboard-cloudflare-workers
    files:
      - dashboards/cloudflare-workers.json
resources:
  - namespace.yaml
  - pvc-prometheus.yaml
  - pvc-grafana.yaml
  - pvc-alertmanager.yaml
  - prometheus-config.yaml
  - prometheus.yaml
  - prometheus-service.yaml
  - cloudflare-exporter.yaml
  - alertmanager-config.yaml
  - alertmanager.yaml
  - alertmanager-service.yaml
  - grafana-datasource.yaml
  - grafana-cloudflare-dashboard-provider.yaml
  - grafana.yaml
  - grafana-service.yaml
  - ingress-grafana.yaml
  - ingress-prometheus.yaml
  - ingress-alertmanager.yaml
