apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  # Add or replace receivers here if you want a different destination than Telegram.
  # Prometheus rules live in prometheus-config ConfigMap (alerts.yml).
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram
      group_by: ['alertname', 'service', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    inhibit_rules:
      # Prefer in-cluster Immich signal over blackbox when both fire.
      - source_matchers:
          - alertname="ImmichServerDown"
        target_matchers:
          - alertname="ServiceUnreachable"
          - service="immich"
      # If Prometheus or Alertmanager pods are down, skip duplicate external probe alerts.
      - source_matchers:
          - alertname="InfrastructureTargetDown"
          - job="prometheus"
        target_matchers:
          - alertname="ServiceUnreachable"
          - service="prometheus"
      - source_matchers:
          - alertname="InfrastructureTargetDown"
          - job="alertmanager"
        target_matchers:
          - alertname="ServiceUnreachable"
          - service="alertmanager"
    receivers:
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/bot-token
            chat_id: ${ALERTMANAGER_TELEGRAM_CHAT_ID}
            send_resolved: true
            parse_mode: ""
            message: |-
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}

              {{- if .CommonLabels.service }}
              Service: {{ .CommonLabels.service }}
              {{- end }}
              {{- if .CommonLabels.job }}
              Job: {{ .CommonLabels.job }}
              {{- end }}

              {{- range .Alerts }}
              - {{ .Annotations.summary }}
              {{- if .Annotations.description }}
                {{ .Annotations.description }}
              {{- end }}
              {{- end }}
