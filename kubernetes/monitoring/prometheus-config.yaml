apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 45s
      evaluation_interval: 45s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: alertmanager
        static_configs:
          - targets: ["alertmanager:9093"]
      - job_name: cloudflare-exporter
        scrape_interval: 60s
        scrape_timeout: 45s
        static_configs:
          - targets: ["cloudflare-exporter:8080"]
      - job_name: node-exporter
        scrape_interval: 45s
        static_configs:
          - targets: ["node-exporter:9100"]
      - job_name: fail2ban-exporter
        scrape_interval: 60s
        scrape_timeout: 15s
        static_configs:
          - targets: ["fail2ban-exporter:9191"]
      - job_name: kube-state-metrics
        scrape_interval: 45s
        static_configs:
          - targets: ["kube-state-metrics:8080"]
            labels:
              cluster: k3s
              origin_prometheus: k3s
      - job_name: kubernetes-cadvisor
        scheme: https
        scrape_interval: 90s
        scrape_timeout: 20s
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc.cluster.local:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            action: replace
            target_label: node
        metric_relabel_configs:
          - target_label: origin_prometheus
            replacement: k3s
      - job_name: traefik
        scrape_interval: 45s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: traefik
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            replacement: ${1}:9100
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name
      - job_name: immich-server
        scrape_interval: 45s
        metrics_path: /metrics
        static_configs:
          - targets: ["immich-server.immich.svc.cluster.local:8081"]
            labels:
              namespace: immich
              endpoint: metrics-api
              service_name: immich-server
      - job_name: blackbox-exporter
        static_configs:
          - targets: ["blackbox-exporter:9115"]
      - job_name: blackbox-http
        metrics_path: /probe
        scrape_interval: 120s
        scrape_timeout: 20s
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - "${IMMICH_PUBLIC_URL}/api/server/ping"
              - "${GRAFANA_ROOT_URL}/api/health"
              - "https://${PROMETHEUS_DOMAIN}/-/ready"
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115
