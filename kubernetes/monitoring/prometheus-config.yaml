apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 20s
      evaluation_interval: 20s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: alertmanager
        static_configs:
          - targets: ["alertmanager:9093"]
      - job_name: cloudflare-exporter
        scrape_interval: 60s
        scrape_timeout: 45s
        static_configs:
          - targets: ["cloudflare-exporter:8080"]
