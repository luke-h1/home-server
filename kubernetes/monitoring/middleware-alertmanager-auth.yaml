# Traefik HTTP basic auth for Alertmanager ingress (secret from scripts/k8s.sh secrets).
# Traefik 3 / k3s default. On Traefik 2 use apiVersion traefik.containo.us/v1alpha1.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: alertmanager-auth
  namespace: monitoring
spec:
  basicAuth:
    secret: alertmanager-basic-auth
